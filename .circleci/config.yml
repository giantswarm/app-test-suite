version: 2.1

orbs:
    architect: giantswarm/architect@9.4.1
    codecov: codecov/codecov@6.0.0

workflows:
    test:
        jobs:
            - run-tests:
                  name: run-tests
                  filters:
                      # Needed to trigger job also on git tag.
                      tags:
                          only: /^v.*/

            - architect/push-to-registries:
                  context: architect
                  name: push-to-registries
                  registries-data: |-
                      public gsoci.azurecr.io ACR_GSOCI_USERNAME ACR_GSOCI_PASSWORD true
                  requires:
                      - run-tests
                  filters:
                      # Needed to trigger job also on git tag.
                      tags:
                          only: /^v.*/

                      branches:
                          ignore:
                              - main
                              - master

            - prepare-release-assets:
                  name: prepare-release-assets
                  requires:
                      - push-to-registries
                  filters:
                      branches:
                          ignore: /.*/
                      tags:
                          only: /^v.*/

            - architect/upload-release-assets:
                  context: architect
                  name: upload-release-assets
                  binary: dats
                  requires:
                      - prepare-release-assets
                  filters:
                      branches:
                          ignore: /.*/
                      tags:
                          only: /^v.*/

jobs:
    run-tests:
        machine:
            image: default
        steps:
            - checkout

            - run:
                  name: Execute tests
                  command: |
                      make docker-test-ci

            - codecov/upload

    prepare-release-assets:
        executor: architect/architect
        steps:
            - checkout
            - run:
                  name: Stage dats.sh as release asset
                  command: |
                      cp dats.sh dats-linux-amd64
                      cp dats.sh dats-linux-arm64
                      chmod +x dats-linux-amd64 dats-linux-arm64
            - persist_to_workspace:
                  root: .
                  paths:
                      - dats-linux-amd64
                      - dats-linux-arm64
